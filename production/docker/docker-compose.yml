# From this directory: docker compose up -d --build
#
# The dice-fe image clones the front end from GitHub at build time (see Dockerfile.nginx).

services:
  mongo:
    image: mongo:7
    container_name: dice-mongo
    restart: unless-stopped
    volumes:
      # Host path: dice-be/production/data/mongo (relative to this compose file)
      - ../data/mongo:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 })']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  dice-be:
    build:
      context: ../..
      dockerfile: production/docker/Dockerfile
    container_name: dice-be
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - '${DICE_BE_PORT:-5020}:5020'
    environment:
      SVC_ENV: prod
      NODE_ENV: production
      PORT: '5020'
      DBURL: mongodb://mongo:27017/dice-prod
      DISABLE_IPFS: 'true'
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '10'

  dice-fe:
    build:
      context: ../..
      dockerfile: production/docker/Dockerfile.nginx
      args:
        REACT_APP_DICE_SERVER: ${REACT_APP_DICE_SERVER:-http://localhost:5020}
        DICE_FE_REPO: ${DICE_FE_REPO:-https://github.com/christroutner/dice-fe.git}
        DICE_FE_GIT_REF: ${DICE_FE_GIT_REF:-main}
    container_name: dice-fe
    restart: unless-stopped
    # Default 8080 — port 80 is often taken by Apache/nginx on the host.
    ports:
      - '${DICE_FE_PORT:-8080}:80'
